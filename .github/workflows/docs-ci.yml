name: Docs QA CI

on:
  push:
    paths:
      - 'fern/**'
      - 'scripts/**'
      - 'package.json'
  pull_request:
    paths:
      - 'fern/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  docs-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ./
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install npm dependencies
        run: npm ci
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Python QA tools
        run: |
          python -m pip install --quiet black pyspellchecker
      - name: Run Prettier formatting (optional, fails on diff)
        run: |
          npm run docs:format
          # Ensure no uncommitted changes after formatting
          git diff --exit-code || (echo "Prettier formatting changes detected" && exit 1)
      - name: Run Docs QA pipeline
        run: npm run docs:qa
